AWSTemplateFormatVersion: "2010-09-09"
Description: mnemospark website production stack (S3 private origin + CloudFront + GitHub OIDC deploy role)

Parameters:
  ProjectName:
    Type: String
    Default: mnemospark-website
    AllowedPattern: "[a-zA-Z0-9-]+"
  DomainName:
    Type: String
    Default: mnemospark.ai
  WwwDomainName:
    Type: String
    Default: www.mnemospark.ai
  AcmCertificateArn:
    Type: String
    Description: ACM certificate ARN in us-east-1 covering apex and www
  GitHubOrg:
    Type: String
    Default: pawlsclick
  GitHubRepo:
    Type: String
    Default: mnemospark-website
  GitHubBranch:
    Type: String
    Default: main
  GitHubDeployRoleName:
    Type: String
    Default: mnemospark-website-github-deploy-main
  GitHubOidcProviderArn:
    Type: String
    Description: Existing IAM OIDC provider ARN for GitHub Actions (token.actions.githubusercontent.com)

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-prod-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${ProjectName}-security-headers"
        SecurityHeadersConfig:
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Override: true
          XSSProtection:
            ModeBlock: true
            Protection: true
            Override: true

  WwwRedirectFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${ProjectName}-www-to-apex"
      AutoPublish: true
      FunctionConfig:
        Comment: Redirect www host to apex domain
        Runtime: cloudfront-js-2.0
      FunctionCode: !Sub |
        function handler(event) {
          var request = event.request;
          var host = request.headers.host && request.headers.host.value;
          if (host === "${WwwDomainName}") {
            var location = "https://${DomainName}" + request.uri;
            var querystring = request.querystring || {};
            var queryKeys = Object.keys(querystring);
            if (queryKeys.length > 0) {
              var query = [];
              for (var i = 0; i < queryKeys.length; i++) {
                var key = queryKeys[i];
                var entry = querystring[key];
                if (entry.multiValue) {
                  for (var j = 0; j < entry.multiValue.length; j++) {
                    query.push(key + "=" + entry.multiValue[j].value);
                  }
                } else {
                  query.push(key + "=" + entry.value);
                }
              }
              location += "?" + query.join("&");
            }
            return {
              statusCode: 301,
              statusDescription: "Moved Permanently",
              headers: {
                location: { value: location },
                "cache-control": { value: "public, max-age=300" }
              }
            };
          }
          return request;
        }

  WebsiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${ProjectName} production distribution"
        Aliases:
          - !Ref DomainName
          - !Ref WwwDomainName
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Origins:
          - Id: s3-origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: s3-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # Managed-CachingOptimized
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt WwwRedirectFunction.FunctionMetadata.FunctionARN
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${WebsiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebsiteDistribution}"

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref GitHubDeployRoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/${GitHubBranch}"
      Policies:
        - PolicyName: website-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !GetAtt WebsiteBucket.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:GetObject
                Resource:
                  - !Sub "${WebsiteBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                  - cloudfront:GetDistribution
                Resource:
                  - !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebsiteDistribution}"
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource: "*"

Outputs:
  BucketName:
    Value: !Ref WebsiteBucket
  BucketArn:
    Value: !GetAtt WebsiteBucket.Arn
  DistributionId:
    Value: !Ref WebsiteDistribution
  DistributionDomainName:
    Value: !GetAtt WebsiteDistribution.DomainName
  GitHubDeployRoleArn:
    Value: !GetAtt GitHubDeployRole.Arn
  ApexDnsTarget:
    Description: Porkbun ALIAS target for root (@)
    Value: !GetAtt WebsiteDistribution.DomainName
  WwwDnsTarget:
    Description: Porkbun CNAME target for www
    Value: !GetAtt WebsiteDistribution.DomainName
