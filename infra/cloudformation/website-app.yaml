AWSTemplateFormatVersion: "2010-09-09"
Description: mnemospark app static shell stack (S3 private origin + CloudFront + GitHub OIDC deploy role)

Parameters:
  ProjectName:
    Type: String
    Default: mnemospark-website
    AllowedPattern: "[a-zA-Z0-9-]+"
  AppDomainName:
    Type: String
    Default: app.mnemospark.ai
  AcmCertificateArn:
    Type: String
    Description: ACM certificate ARN in us-east-1 (must cover app.mnemospark.ai)
  GitHubOrg:
    Type: String
    Default: pawlsclick
  GitHubRepo:
    Type: String
    Default: mnemospark-website
  GitHubBranch:
    Type: String
    Default: main
  GitHubEnvironmentName:
    Type: String
    Default: app
  CreateGitHubDeployRole:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  GitHubDeployRoleName:
    Type: String
    Default: mnemospark-website-app-github-deploy-main
  GitHubOidcProviderArn:
    Type: String
    Description: Existing IAM OIDC provider ARN for GitHub Actions (token.actions.githubusercontent.com)

Conditions:
  CreateGitHubDeployRoleCondition: !Equals [!Ref CreateGitHubDeployRole, "true"]

Resources:
  AppBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-app-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-app-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${ProjectName}-app-security-headers"
        SecurityHeadersConfig:
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Override: true
          XSSProtection:
            ModeBlock: true
            Protection: true
            Override: true

  AppDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${ProjectName} app distribution"
        Aliases:
          - !Ref AppDomainName
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Origins:
          - Id: s3-origin
            DomainName: !GetAtt AppBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: s3-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # Managed-CachingOptimized
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

  AppBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AppBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${AppBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${AppDistribution}"

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Condition: CreateGitHubDeployRoleCondition
    Properties:
      RoleName: !Ref GitHubDeployRoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:repository: !Sub "${GitHubOrg}/${GitHubRepo}"
              StringLikeIfExists:
                token.actions.githubusercontent.com:ref: !Sub "refs/heads/${GitHubBranch}"
              StringLike:
                token.actions.githubusercontent.com:sub:
                  - !Sub "repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/${GitHubBranch}"
                  - !Sub "repo:${GitHubOrg}/${GitHubRepo}:environment:${GitHubEnvironmentName}"

  GitHubDeployRolePolicy:
    Type: AWS::IAM::Policy
    Condition: CreateGitHubDeployRoleCondition
    Properties:
      PolicyName: website-app-deploy
      Roles:
        - !Ref GitHubDeployRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:ListBucket
            Resource:
              - !GetAtt AppBucket.Arn
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:DeleteObject
              - s3:GetObject
            Resource:
              - !Sub "${AppBucket.Arn}/*"
          - Effect: Allow
            Action:
              - cloudfront:CreateInvalidation
              - cloudfront:GetDistribution
            Resource:
              - !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${AppDistribution}"
          - Effect: Allow
            Action:
              - cloudformation:DescribeStacks
              - cloudformation:GetTemplateSummary
              - cloudformation:CreateChangeSet
              - cloudformation:DescribeChangeSet
              - cloudformation:ExecuteChangeSet
              - cloudformation:DeleteChangeSet
              - cloudformation:DeleteStack
            Resource: "*"

Outputs:
  BucketName:
    Value: !Ref AppBucket
  BucketArn:
    Value: !GetAtt AppBucket.Arn
  DistributionId:
    Value: !Ref AppDistribution
  DistributionDomainName:
    Value: !GetAtt AppDistribution.DomainName
  GitHubDeployRoleArn:
    Value: !Sub "arn:aws:iam::${AWS::AccountId}:role/${GitHubDeployRoleName}"
  AppDnsTarget:
    Description: Porkbun CNAME target for app
    Value: !GetAtt AppDistribution.DomainName
