name: Deploy website to production (CloudFront)

on:
  push:
    branches: [main]
    paths:
      - "prod/**"
      - ".github/workflows/deploy-prod.yml"
      - "infra/cloudformation/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: website-prod-deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "123456789012"
  AWS_ROLE_NAME: mnemospark-website-github-deploy-main
  CFN_STACK_NAME: mnemospark-website-prod
  CFN_TEMPLATE_FILE: infra/cloudformation/website-prod.yaml
  DOMAIN_NAME: mnemospark.ai
  WWW_DOMAIN_NAME: www.mnemospark.ai
  ACM_CERTIFICATE_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.AWS_ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy CloudFormation stack
        shell: bash
        run: |
          set -euo pipefail

          aws cloudformation deploy \
            --stack-name "$CFN_STACK_NAME" \
            --template-file "$CFN_TEMPLATE_FILE" \
            --region "$AWS_REGION" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              GitHubOidcProviderArn="arn:aws:iam::${AWS_ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com" \
             DomainName="${{ env.DOMAIN_NAME }}" \
             WwwDomainName="${{ env.WWW_DOMAIN_NAME }}" \
             AcmCertificateArn="${{ secrets.ACM_CERTIFICATE_ARN }}"

      - name: Resolve stack outputs
        id: outputs
        shell: bash
        run: |
          set -euo pipefail

          STACK_JSON=$(aws cloudformation describe-stacks \
            --stack-name "$CFN_STACK_NAME" \
            --region "$AWS_REGION")

          STACK_STATUS=$(echo "$STACK_JSON" | jq -r '.Stacks[0].StackStatus')
          echo "CloudFormation stack status: $STACK_STATUS"

          BUCKET=$(echo "$STACK_JSON" | jq -r '.Stacks[0].Outputs // [] | .[] | select(.OutputKey=="BucketName") | .OutputValue')
          DIST_ID=$(echo "$STACK_JSON" | jq -r '.Stacks[0].Outputs // [] | .[] | select(.OutputKey=="DistributionId") | .OutputValue')
          DIST_DOMAIN=$(echo "$STACK_JSON" | jq -r '.Stacks[0].Outputs // [] | .[] | select(.OutputKey=="DistributionDomainName") | .OutputValue')

          if [[ -z "$BUCKET" || "$BUCKET" == "null" ]]; then
            echo "BucketName output not found in stack $CFN_STACK_NAME" >&2
            echo "$STACK_JSON" | jq '.Stacks[0] | {StackName, StackStatus, StackStatusReason, Outputs}'
            exit 1
          fi

          if [[ -z "$DIST_ID" || "$DIST_ID" == "null" ]]; then
            echo "DistributionId output not found in stack $CFN_STACK_NAME" >&2
            echo "$STACK_JSON" | jq '.Stacks[0] | {StackName, StackStatus, StackStatusReason, Outputs}'
            exit 1
          fi

          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DIST_ID" >> "$GITHUB_OUTPUT"
          echo "distribution_domain=$DIST_DOMAIN" >> "$GITHUB_OUTPUT"

      - name: Deploy assets (non-HTML)
        shell: bash
        run: |
          set -euo pipefail
          aws s3 sync ./prod "s3://${{ steps.outputs.outputs.bucket }}" \
            --delete \
            --exclude "*.html" \
            --cache-control "public, max-age=86400"

      - name: Deploy HTML (no-cache)
        shell: bash
        run: |
          set -euo pipefail
          aws s3 sync ./prod "s3://${{ steps.outputs.outputs.bucket }}" \
            --delete \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront
        shell: bash
        run: |
          set -euo pipefail
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.outputs.outputs.distribution_id }}" \
            --paths "/*"

      - name: Deployment summary
        shell: bash
        run: |
          set -euo pipefail
          echo "Deployed to CloudFront distribution: ${{ steps.outputs.outputs.distribution_id }}"
          echo "CloudFront domain: ${{ steps.outputs.outputs.distribution_domain }}"